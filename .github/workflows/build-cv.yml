name: Build Resume

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch: # Permite compilar manualmente pela aba Actions

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. Pega os arquivos do seu repositório
      - name: Checkout do código
        uses: actions/checkout@v4

      # 2. Instala a engine Typst na máquina do GitHub
      - name: Setup Typst
        uses: typst-community/setup-typst@v3

      # 3. Compila o seu arquivo main.typ para PDF
      - name: Compilar PDF
        run: typst compile main.typ Curriculo_Henrique_Tressoldi.pdf

      # 4. Disponibiliza o PDF para download como um Artefato da Build
      - name: Upload PDF (Artefato)
        uses: actions/upload-artifact@v4
        with:
          name: curriculo-henrique-tressoldi
          path: Curriculo_Henrique_Tressoldi.pdf
          retention-days: 90
