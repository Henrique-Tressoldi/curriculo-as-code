name: Build Resume

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch: # Permite compilar manualmente pela aba Actions

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # 1. Pega os arquivos do seu repositório
      - name: Checkout do código
        uses: actions/checkout@v4

      # 2. Instala a engine Typst na máquina do GitHub
      - name: Setup Typst
        uses: typst-community/setup-typst@v3

      # 3. Compila o seu arquivo main.typ para PDF
      - name: Compilar PDF
        run: typst compile main.typ Curriculo_Henrique_Tressoldi.pdf

      # 4. Salva o PDF de volta no seu repositório automaticamente
      - name: Auto Commit Mágico
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update currículo PDF automático 🤖"
          file_pattern: "Curriculo_Henrique_Tressoldi.pdf"
